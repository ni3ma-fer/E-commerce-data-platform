# docker/docker-compose.api.yml
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: kivendtout-redis
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: kivendtout-api
    ports:
      - '8000:8000'
    env_file:
      - ../.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      MLFLOW_TRACKING_URI: http://host.docker.internal:5000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-kivendtout-dev-secret}
      FRAUD_ALERT_THRESHOLD: '0.80'
      PYTHONPATH: /app
    volumes:
      - ../ml:/app/ml
      - ../dbt:/app/dbt
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      retries: 3
